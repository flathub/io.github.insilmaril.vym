app-id: io.github.insilmaril.vym
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: vym
rename-desktop-file: vym.desktop
rename-icon: vym
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --filesystem=xdg-documents
  - --own-name=org.insilmaril.vym-2

modules:
  - name: vym
    buildsystem: cmake-ninja
    post-install:
      - install -Dm644 icons/vym-128x128.png /app/share/icons/hicolor/128x128/apps/vym.png
      - install -Dm644 config/io.github.insilmaril.vym.appdata.xml /app/share/appdata/io.github.insilmaril.vym.appdata.xml
    sources:
      - type: git
        url: https://github.com/insilmaril/vym.git
        commit: a6ee25f3315e0236ef13d5c4294586556801e365
      - type: patch
        path: appdata.patch
        
